version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: schedule_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: schedule_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: schedule_db

  client:
    build: ./client
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pgdata: